<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="AI Linux Assistant">
  <!-- App icon: the AI "glint" sparkle (the same motif as the Rive glint persona in
       ui/persona.html) on the app's glassy blue/violet/cyan card. A glowing 4-point
       sparkle replaces the old plain circle orb so the launcher matches the persona. -->
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"    stop-color="#5b8cff"/>
      <stop offset="0.52" stop-color="#7c4dff"/>
      <stop offset="1"    stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.38"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="spark" cx="0.5" cy="0.46" r="0.6">
      <stop offset="0"    stop-color="#ffffff"/>
      <stop offset="0.6"  stop-color="#ffffff" stop-opacity="0.98"/>
      <stop offset="1"    stop-color="#d7e3ff" stop-opacity="0.92"/>
    </radialGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.80"/>
      <stop offset="0.6" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- glass card -->
  <rect x="18" y="18" width="220" height="220" rx="54" fill="url(#card)"/>
  <!-- frosted top sheen -->
  <rect x="18" y="18" width="220" height="130" rx="54" fill="url(#sheen)"/>
  <!-- hairline border / specular edge -->
  <rect x="19.5" y="19.5" width="217" height="217" rx="52.5" fill="none"
        stroke="#ffffff" stroke-opacity="0.55" stroke-width="2.5"/>

  <!-- soft glow behind the glint -->
  <circle cx="128" cy="130" r="92" fill="url(#glow)"/>

  <!-- main 4-point glint sparkle (concave arms pinched at the centre) -->
  <path d="M128 50 Q128 130 206 130 Q128 130 128 210 Q128 130 50 130 Q128 130 128 50 Z"
        fill="url(#spark)"/>

  <!-- small accent sparkle (top-right) for the classic AI-glint feel -->
  <path d="M182 78 Q182 96 202 96 Q182 96 182 114 Q182 96 162 96 Q182 96 182 78 Z"
        fill="#ffffff" fill-opacity="0.92"/>
</svg>
